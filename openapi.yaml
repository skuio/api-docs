  /api/bills:
    post:
      tags:
      - Bills
      summary: Create Bill
      description: "Creates a standalone bill. Note: This endpoint is currently not\
        \ used in practice — bills are typically created via purchase order or warehouse\
        \ transfer nested routes.\n\nAuthentication: Requires Bearer token.\n\nFields:\n\
        - vendor_id (required): ID of the vendor\n- invoice_number (required, unique):\
        \ Invoice reference number\n- invoice_date (required): Invoice date (YYYY-MM-DD)\n\
        - link_type (required): Type of link — 'purchase_order' or 'warehouse_transfer'\n\
        - link_id (required): ID of the linked record\n- currency_id (optional): Currency\
        \ ID\n- currency_rate (optional): Exchange rate\n- proration_strategy (required):\
        \ One of cost_based, quantity_based, manual\n- lines (required): Array of\
        \ bill lines\n  - lines.*.description: Line description\n  - lines.*.quantity:\
        \ Quantity\n  - lines.*.amount: Unit amount\n  - lines.*.nominal_code_id:\
        \ Nominal code ID\n  - lines.*.tax_rate_id: Tax rate ID (optional)\n- allocations\
        \ (optional): Array of allocation objects\n  - allocations.*.purchase_order_line_id:\
        \ PO line ID\n  - allocations.*.allocation_amount: Amount to allocate"
      requestBody:
        content:
          application/json:
            schema:
              type: object
              example:
                vendor_id: 3
                invoice_number: INV-2024-001
                invoice_date: '2024-01-15'
                link_type: purchase_order
                link_id: 42
                currency_id: 1
                currency_rate: 1
                proration_strategy: cost_based
                lines:
                - description: Product A - 100 units
                  quantity: 100
                  amount: 5.5
                  nominal_code_id: 10
                  tax_rate_id: null
                allocations:
                - purchase_order_line_id: 55
                  allocation_amount: 550
      parameters:
