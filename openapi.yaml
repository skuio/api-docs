    get:
      tags:
      - Products
      summary: Get Product
      description: 'Get a single product with default relations loaded (brand, primaryImage,
        primaryCategory, tags, defaultSupplierProduct.supplier, totalInventory).


        Authentication: Requires Bearer token.


