openapi: 3.0.3
info:
  title: SKU.io API
  description: |
    SKU.io is an inventory management platform for multichannel ecommerce brands.

    ## Authentication

    SKU.io uses **Personal Access Tokens (PATs)** for API authentication.

    1. Log in to your SKU.io account
    2. Go to **Settings → Developer → Personal Access Tokens**
    3. Create a named token with the scopes you need
    4. Use it as a Bearer token in the `Authorization` header

    ```
    Authorization: Bearer <your-token>
    ```
  version: 1.0.0
  contact:
    name: SKU.io Support
    url: https://sku.io
servers:
  - url: https://{tenant}.sku.io
    description: Production
    variables:
      tenant:
        default: app
        description: Your SKU.io subdomain

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      description: Personal Access Token from Settings → Developer → Personal Access Tokens

security:
  - bearerAuth: []

paths: {}
