  /api/v2/products:
    get:
      tags:
      - Products
      summary: List Products
      description: 'Get a paginated list of products using Spatie QueryBuilder.


        Authentication: Requires Bearer token.


        Supports both simple query filters (filter[field]=value) and advanced grouped
        filters (filter_groups tree). Default: shows non-archived products sorted
        by -created_at.


        Allowed sorts: id, sku, name, type, barcode, mpn, unit_cost, average_cost,
        supplier_price, weight, length, width, height, case_quantity, case_weight,
        daily_average_consumption, daily_average_consumption_net_returns, min_stock_level,
        archived_at, created_at, updated_at


        Default pagination: 10 per page.'
      parameters:
      - name: Accept
        in: header
        schema:
          type: string
        example: application/json
      - name: page
        in: query
        schema:
          type: integer
        description: 'Page number (default: 1)'
        example: '1'
      - name: per_page
        in: query
        schema:
          type: integer
        description: 'Items per page (default: 10)'
        example: '10'
      - name: sort
        in: query
        schema:
          type: string
        description: 'Sort field. Prefix with - for descending. Allowed: id, sku,
          name, type, barcode, mpn, unit_cost, average_cost, supplier_price, weight,
          length, width, height, case_quantity, case_weight, daily_average_consumption,
          daily_average_consumption_net_returns, min_stock_level, archived_at, created_at,
          updated_at'
        example: -created_at
      - name: filter[search]
        in: query
        schema:
          type: string
        description: Full-text search across ID (exact), SKU, name, barcode, MPN,
          and brand name
        example: widget
      - name: filter[type]
        in: query
        schema:
          type: string
        description: 'Exact product type: standard, bundle, kit, blemished, matrix'
        example: standard
      - name: filter[archived]
        in: query
        schema:
          type: integer
        description: 'Archived state: 0 or omit for active only, ''only'' for archived
          only, ''all'' for all'
        example: '0'
      - name: filter[brand_id]
        in: query
        schema:
          type: integer
        description: Filter by brand ID(s), comma-separated
        example: '1'
      - name: filter[default_supplier_id]
        in: query
        schema:
          type: integer
        description: Filter by default supplier ID(s), comma-separated
        example: '2'
      - name: filter[stock_status]
        in: query
        schema:
          type: string
        description: 'Stock status: in_stock, out_of_stock'
        example: in_stock
      - name: filter[has_backorder]
        in: query
        schema:
          type: boolean
        description: 'Filter by backorder presence: true or false'
        example: 'false'
      - name: filter[has_fba]
        in: query
        schema:
          type: boolean
        description: 'Filter by FBA listing presence: true or false'
        example: 'false'
      - name: filter[ids]
        in: query
        schema:
          type: string
        description: Comma-separated list of product IDs to include
        example: 1,2,3
      - name: filter[is_dropshippable]
        in: query
        schema:
          type: integer
        description: 'Filter dropshippable products: 1 or 0'
        example: '1'
      - name: filter_groups
        in: query
        schema:
          type: string
        description: 'Advanced grouped filter tree (JSON). Columns: sku, name, barcode,
          mpn, type, unit_cost, average_cost, brand_name, supplier_name, supplier_sku,
          tag, category, inventory_total, inventory_available, etc.'
      responses:
        '200':
          description: Successful response
          content:
            application/json: {}
