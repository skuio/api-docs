paths:
  /api/accounting/v3/transactions:
    get:
      tags:
      - Accounting
      summary: List Transactions (V3 - Paginated)
      description: 'Returns a paginated list of accounting transactions using the
        Spatie QueryBuilder. This is the V3 replacement for the legacy DataTable index
        endpoint.


        Authentication: Requires Bearer token


        Allowed sorts: id, transaction_date, type, reference, name, total, created_at,
        updated_at (prefix with - for descending)


        Default sort: -id (newest first)


        Pagination: Default 10 per page'
      parameters:
      - name: Accept
        in: header
        schema:
          type: string
        example: application/json
      - name: page
        in: query
        schema:
          type: integer
        description: 'Page number (default: 1)'
        example: '1'
      - name: per_page
        in: query
        schema:
          type: integer
        description: 'Items per page (default: 10)'
        example: '10'
      - name: sort
        in: query
        schema:
          type: string
        description: 'Sort field. Prefix - for descending. Allowed: id, transaction_date,
          type, reference, name, total, created_at, updated_at'
        example: -id
      - name: filter[search]
        in: query
        schema:
          type: string
        description: Search by ID, reference, name, or integration invoice number
          override
        example: INV-1001
      - name: filter[type]
        in: query
        schema:
          type: string
        description: 'Filter by type (comma-separated for multiple). Values: sales_order_invoice,
          purchase_order_invoice, credit_note, payment, etc.'
        example: sales_order_invoice
      - name: filter[status]
        in: query
        schema:
          type: string
        description: synced | notSynced | hasErrors
        example: synced
      - name: filter[sync_enabled]
        in: query
        schema:
          type: string
        description: yes | no
        example: 'yes'
      - name: filter[has_error]
        in: query
        schema:
          type: string
        description: yes | no — filter by presence of sync errors
        example: 'yes'
      - name: filter[nominal_code]
        in: query
        schema:
          type: integer
        description: Partial match on nominal code
        example: '4000'
      - name: filter[transaction_date.from]
        in: query
        schema:
          type: string
        description: Transaction date from (YYYY-MM-DD)
        example: '2024-01-01'
      - name: filter[transaction_date.to]
        in: query
        schema:
          type: string
        description: Transaction date to (YYYY-MM-DD)
        example: '2024-12-31'
      responses:
        '200':
          description: Successful response
          content:
            application/json: {}
  /api/accounting/transactions/:id:
    get:
      tags:
      - Accounting
      summary: Get Transaction
      description: 'Returns a single accounting transaction with full details including
        lines, nominal codes, tax rates, integration data, and parent/children.


        Authentication: Requires Bearer token'
      parameters:
      - name: Accept
        in: header
        schema:
          type: string
        example: application/json
      responses:
        '200':
          description: Successful response
          content:
            application/json: {}
  /api/accounting/transactions:
    post:
      tags:
      - Accounting
      summary: Create Transaction
      description: 'Creates a new accounting transaction.


        Authentication: Requires Bearer token'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              example:
                transaction_date: '2024-06-15'
                type: sales_order_invoice
                link_type: App\Models\SalesOrder
                link_id: 500
                name: Invoice for SO-1001
                reference: SO-1001
                total: 250
                is_tax_included: false
                is_sync_enabled: true
      parameters:
      - name: Accept
        in: header
        schema:
          type: string
        example: application/json
      - name: Content-Type
        in: header
        schema:
          type: string
        example: application/json
      responses:
        '200':
          description: Successful response
          content:
            application/json: {}
    delete:
      tags:
      - Accounting
      summary: Bulk Delete Transactions
      description: 'Deletes multiple accounting transactions by ID.


        Authentication: Requires Bearer token


        Required: ids (array of integer transaction IDs)'
      parameters:
      - name: Accept
        in: header
        schema:
          type: string
        example: application/json
      - name: Content-Type
        in: header
        schema:
          type: string
        example: application/json
      responses:
        '200':
          description: Successful response
          content:
            application/json: {}
  /api/accounting/transactions/:transaction:
    put:
      tags:
      - Accounting
      summary: Update Transaction
      description: 'Updates an existing accounting transaction.


        Authentication: Requires Bearer token'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              example:
                integration_invoice_number_override: INV-2024-001
                is_sync_enabled: true
      parameters:
      - name: Accept
        in: header
        schema:
          type: string
        example: application/json
      - name: Content-Type
        in: header
        schema:
          type: string
        example: application/json
      responses:
        '200':
          description: Successful response
          content:
            application/json: {}
    delete:
      tags:
      - Accounting
      summary: Delete Transaction
      description: 'Deletes an accounting transaction.


        Authentication: Requires Bearer token'
      parameters:
      - name: Accept
        in: header
        schema:
          type: string
        example: application/json
      responses:
        '200':
          description: Successful response
          content:
            application/json: {}
  /api/accounting/transactions/needing-sync:
    get:
      tags:
      - Accounting
      summary: Get Transactions Needing Sync
      description: 'Returns accounting transactions that need to be synced to the
        configured integration (QBO or Xero). Integration-agnostic: auto-detects the
        configured accounting system.


        Authentication: Requires Bearer token'
      parameters:
      - name: Accept
        in: header
        schema:
          type: string
        example: application/json
      - name: per_page
        in: query
        schema:
          type: integer
        description: 'Items per page (1-100, default: 15)'
        example: '15'
      - name: page
        in: query
        schema:
          type: integer
        description: 'Page number (default: 1)'
        example: '1'
      - name: type
        in: query
        schema:
          type: string
        description: Filter by transaction type enum value
        example: sales_order_invoice
      - name: link_type
        in: query
        schema:
          type: string
        description: Filter by linked entity class
        example: App\Models\SalesOrder
      - name: transaction_ids[]
        in: query
        schema:
          type: integer
        description: Filter by specific transaction IDs
        example: '1001'
      responses:
        '200':
          description: Successful response
          content:
            application/json: {}
  /api/accounting/transactions/needing-sync/count:
    get:
      tags:
      - Accounting
      summary: Get Transactions Needing Sync Count
      description: 'Returns the count of accounting transactions that need to be synced.
        Integration-agnostic.


        Authentication: Requires Bearer token'
      parameters:
      - name: Accept
        in: header
        schema:
          type: string
        example: application/json
      - name: type
        in: query
        schema:
          type: string
        description: Filter by transaction type
        example: sales_order_invoice
      - name: link_type
        in: query
        schema:
          type: string
        description: Filter by linked entity class
        example: App\Models\SalesOrder
      responses:
        '200':
          description: Successful response
          content:
            application/json: {}
  /api/accounting/transactions/awaiting-sync:
    get:
      tags:
      - Accounting
      summary: Get Awaiting Sync Report
      description: 'Returns a summary report of transactions awaiting sync, grouped
        by type.


        Authentication: Requires Bearer token'
      parameters:
      - name: Accept
        in: header
        schema:
          type: string
        example: application/json
      responses:
        '200':
          description: Successful response
          content:
            application/json: {}
  /api/accounting/transactions/:accountingTransaction/payments:
    get:
      tags:
      - Accounting
      summary: Get Transaction Payments
      description: 'Returns all payments associated with a specific accounting transaction.


        Authentication: Requires Bearer token'
      parameters:
      - name: Accept
        in: header
        schema:
          type: string
        example: application/json
      responses:
        '200':
          description: Successful response
          content:
            application/json: {}
  /api/accounting/transactions/sync-external:
    post:
      tags:
      - Accounting
      summary: Sync Transactions to External
      description: 'Forces sync of the specified accounting transaction IDs to the
        external integration (QBO or Xero). Bypasses timestamp eligibility checks
        but still respects basic eligibility. Supports both creates and updates.


        Authentication: Requires Bearer token


        Required: ids (array of transaction IDs)'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              example:
                ids:
                - 1001
                - 1002
                - 1003
      parameters:
      - name: Accept
        in: header
        schema:
          type: string
        example: application/json
      - name: Content-Type
        in: header
        schema:
          type: string
        example: application/json
      responses:
        '200':
          description: Successful response
          content:
            application/json: {}
  /api/accounting/transactions/sync-all:
    post:
      tags:
      - Accounting
      summary: Sync All Transactions
      description: 'Dispatches a background job to sync all eligible accounting transactions
        to the external integration.


        Authentication: Requires Bearer token'
      requestBody:
        content: {}
      parameters:
      - name: Accept
        in: header
        schema:
          type: string
        example: application/json
      responses:
        '200':
          description: Successful response
          content:
            application/json: {}
  /api/accounting/transactions/refresh:
    post:
      tags:
      - Accounting
      summary: Refresh Transactions
      description: 'Re-syncs accounting transaction data from the source documents
        (sales orders, purchase orders, etc.) to recalculate totals and lines.


        Authentication: Requires Bearer token'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              example:
                ids:
                - 1001
                - 1002
      parameters:
      - name: Accept
        in: header
        schema:
          type: string
        example: application/json
      - name: Content-Type
        in: header
        schema:
          type: string
        example: application/json
      responses:
        '200':
          description: Successful response
          content:
            application/json: {}
  /api/accounting/transactions/clear-errors:
    post:
      tags:
      - Accounting
      summary: Clear Transaction Errors
      description: 'Clears sync errors on the specified accounting transactions so
        they can be retried.


        Authentication: Requires Bearer token'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              example:
                ids:
                - 1001
                - 1002
      parameters:
      - name: Accept
        in: header
        schema:
          type: string
        example: application/json
      - name: Content-Type
        in: header
        schema:
          type: string
        example: application/json
      responses:
        '200':
          description: Successful response
          content:
            application/json: {}
  /api/accounting/transactions/unlink-from-integration:
    post:
      tags:
      - Accounting
      summary: Unlink Transactions from Integration
      description: 'Unlinks the specified accounting transactions from the external
        accounting integration (removes the integration reference, allowing them to
        be re-synced as new).


        Authentication: Requires Bearer token'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              example:
                ids:
                - 1001
                - 1002
      parameters:
      - name: Accept
        in: header
        schema:
          type: string
        example: application/json
      - name: Content-Type
        in: header
        schema:
          type: string
        example: application/json
      responses:
        '200':
          description: Successful response
          content:
            application/json: {}
  /api/accounting/transactions/bulk-replace-nominal-codes:
    post:
      tags:
      - Accounting
      summary: Bulk Replace Nominal Codes
      description: 'Replaces the nominal code on all lines of the specified transactions
        where the old nominal code is used.


        Authentication: Requires Bearer token


        Required fields:

        - ids: array of transaction IDs (min 1)

        - old_nominal_code_id: integer

        - new_nominal_code_id: integer

        - is_locked: boolean (whether to lock the transactions after replacing)'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              example:
                ids:
                - 1001
                - 1002
                - 1003
                old_nominal_code_id: 10
                new_nominal_code_id: 15
                is_locked: false
      parameters:
      - name: Accept
        in: header
        schema:
          type: string
        example: application/json
      - name: Content-Type
        in: header
        schema:
          type: string
        example: application/json
      responses:
        '200':
          description: Successful response
          content:
            application/json: {}
  /api/accounting/transactions/bulk-enable-sync:
    post:
      tags:
      - Accounting
      summary: Bulk Enable/Disable Sync
      description: 'Enables or disables sync for the specified accounting transactions.


        Authentication: Requires Bearer token


        Required fields:

        - ids: array of transaction IDs (min 1)

        - status: boolean (true = enable sync, false = disable sync)'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              example:
                ids:
                - 1001
                - 1002
                - 1003
                status: true
      parameters:
      - name: Accept
        in: header
        schema:
          type: string
        example: application/json
      - name: Content-Type
        in: header
        schema:
          type: string
        example: application/json
      responses:
        '200':
          description: Successful response
          content:
            application/json: {}
  /api/accounting/transactions/delete-integration-payments:
    post:
      tags:
      - Accounting
      summary: Delete Integration Payments (Transactions)
      description: 'Deletes payments from Xero for the specified transaction IDs.


        Authentication: Requires Bearer token'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              example:
                ids:
                - 1001
                - 1002
      parameters:
      - name: Accept
        in: header
        schema:
          type: string
        example: application/json
      - name: Content-Type
        in: header
        schema:
          type: string
        example: application/json
      responses:
        '200':
          description: Successful response
          content:
            application/json: {}
  /api/accounting/transactions/settings-sync:
    put:
      tags:
      - Accounting
      summary: Update Transaction Sync Settings
      description: 'Updates the is_sync_enabled default setting for accounting transactions
        of a given type.


        Authentication: Requires Bearer token'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              example:
                is_sync_enabled: true
                type: sales_order_invoice
      parameters:
      - name: Accept
        in: header
        schema:
          type: string
        example: application/json
      - name: Content-Type
        in: header
        schema:
          type: string
        example: application/json
      responses:
        '200':
          description: Successful response
          content:
            application/json: {}
  /api/accounting/v3/transactions/export:
    get:
      tags:
      - Accounting
      summary: Start Export Job
      description: 'Dispatches a tracked background export job for accounting transactions.
        Returns a tracked_job_log_id to monitor progress via the job tray. When complete,
        use the download endpoint to retrieve the file.


        Authentication: Requires Bearer token


        Supports the same filter/sort parameters as GET /api/accounting/v3/transactions.'
      parameters:
      - name: Accept
        in: header
        schema:
          type: string
        example: application/json
      - name: format
        in: query
        schema:
          type: string
        description: 'xlsx | csv (default: xlsx)'
        example: xlsx
      - name: content_mode
        in: query
        schema:
          type: string
        description: 'summary | detail (default: summary)'
        example: summary
      - name: scope
        in: query
        schema:
          type: string
        description: 'filtered | selected (default: filtered)'
        example: filtered
      - name: ids
        in: query
        schema:
          type: string
        description: Comma-separated IDs when scope=selected
        example: 1001,1002,1003
      - name: columns
        in: query
        schema:
          type: string
        description: Comma-separated column names to include
        example: id,reference,name,total
      - name: filter[type]
        in: query
        schema:
          type: string
        description: Same filters as v3/transactions list
        example: sales_order_invoice
      - name: filter[transaction_date.from]
        in: query
        schema:
          type: string
        example: '2024-01-01'
      - name: sort
        in: query
        schema:
          type: string
        example: -transaction_date
      responses:
        '200':
          description: Successful response
          content:
            application/json: {}
  /api/accounting/v3/transactions/export/download:
    get:
      tags:
      - Accounting
      summary: Download Export File
      description: 'Downloads a completed accounting transaction export file from
        the model-exports disk. Supports both CSV and XLSX files.


        Authentication: Requires Bearer token


        Note: Response is a file download (text/csv or application/vnd.openxmlformats-officedocument.spreadsheetml.sheet)'
      parameters:
      - name: Accept
        in: header
        schema:
          type: string
        example: application/octet-stream
      - name: file
        in: query
        schema:
          type: string
        description: Filename from the completed export job
        example: accounting-transactions-2024-06-15_120000.xlsx
      responses:
        '200':
          description: Successful response
          content:
            application/json: {}
  /api/accounting/v3/payments:
    get:
      tags:
      - Accounting
      summary: List Payments (V3 - Paginated)
      description: 'Returns a paginated list of accounting payments using the Spatie
        QueryBuilder. V3 replacement for the legacy DataTable payments endpoint.


        Authentication: Requires Bearer token'
      parameters:
      - name: Accept
        in: header
        schema:
          type: string
        example: application/json
      - name: page
        in: query
        schema:
          type: integer
        description: Page number
        example: '1'
      - name: per_page
        in: query
        schema:
          type: integer
        description: 'Items per page (default: 10)'
        example: '10'
      responses:
        '200':
          description: Successful response
          content:
            application/json: {}
  /api/accounting/payments/:id:
    get:
      tags:
      - Accounting
      summary: Get Payment
      description: 'Returns a single accounting payment.


        Authentication: Requires Bearer token'
      parameters:
      - name: Accept
        in: header
        schema:
          type: string
        example: application/json
      responses:
        '200':
          description: Successful response
          content:
            application/json: {}
    put:
      tags:
      - Accounting
      summary: Update Payment
      description: 'Updates an existing accounting payment.


        Authentication: Requires Bearer token'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              example:
                payment_date: '2024-06-21'
                amount: 275
      parameters:
      - name: Accept
        in: header
        schema:
          type: string
        example: application/json
      - name: Content-Type
        in: header
        schema:
          type: string
        example: application/json
      responses:
        '200':
          description: Successful response
          content:
            application/json: {}
    delete:
      tags:
      - Accounting
      summary: Delete Payment
      description: 'Deletes an accounting payment.


        Authentication: Requires Bearer token'
      parameters:
      - name: Accept
        in: header
        schema:
          type: string
        example: application/json
      responses:
        '200':
          description: Successful response
          content:
            application/json: {}
  /api/accounting/payments:
    post:
      tags:
      - Accounting
      summary: Create Payment
      description: 'Creates a new accounting payment.


        Authentication: Requires Bearer token'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              example:
                payment_date: '2024-06-20'
                amount: 250
                link_id: 500
                link_type: App\Models\SalesInvoice
      parameters:
      - name: Accept
        in: header
        schema:
          type: string
        example: application/json
      - name: Content-Type
        in: header
        schema:
          type: string
        example: application/json
      responses:
        '200':
          description: Successful response
          content:
            application/json: {}
  /api/accounting/payments/needing-sync:
    get:
      tags:
      - Accounting
      summary: Get Payments Needing Sync
      description: 'Returns payments that need to be synced to the configured accounting
        integration (QBO or Xero).


        Authentication: Requires Bearer token'
      parameters:
      - name: Accept
        in: header
        schema:
          type: string
        example: application/json
      responses:
        '200':
          description: Successful response
          content:
            application/json: {}
  /api/accounting/payments/sync-status:
    get:
      tags:
      - Accounting
      summary: Get Payment Sync Status
      description: 'Returns the current sync status for accounting payments.


        Authentication: Requires Bearer token'
      parameters:
      - name: Accept
        in: header
        schema:
          type: string
        example: application/json
      responses:
        '200':
          description: Successful response
          content:
            application/json: {}
  /api/accounting/payments/sync-external:
    post:
      tags:
      - Accounting
      summary: Sync Payments to External
      description: 'Syncs specific payments to the configured accounting integration
        (QBO or Xero).


        Authentication: Requires Bearer token


        Required: ids (array, min 1)'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              example:
                ids:
                - 201
                - 202
      parameters:
      - name: Accept
        in: header
        schema:
          type: string
        example: application/json
      - name: Content-Type
        in: header
        schema:
          type: string
        example: application/json
      responses:
        '200':
          description: Successful response
          content:
            application/json: {}
  /api/accounting/payments/sync-all:
    post:
      tags:
      - Accounting
      summary: Sync All Payments
      description: 'Syncs all pending payments to the configured accounting integration.


