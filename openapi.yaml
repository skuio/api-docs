      description: "Validates import data rows for a supplier without creating any\
        \ records. Safe to call repeatedly for UI previewing. Returns matched/unmatched\
        \ products and validation errors.\n\nAuthentication: Requires Bearer token.\n\
        \nPath params:\n- supplier: Supplier ID\n\nBody fields:\n- rows (required):\
        \ Array of raw import rows (min 1)\n  - rows.*.sku (optional): Product SKU\n\
        \  - rows.*.quantity (optional): Stock quantity\n  - rows.*.eta (optional):\
        \ ETA date string\n  - rows.*.in_stock (optional): Stock flag\n  - rows.*.discontinued\
        \ (optional): Discontinued flag\n  - rows.*.warehouse (optional): Warehouse\
        \ name"
      requestBody:
        content:
          application/json:
            schema:
              type: object
              example:
                rows:
                - sku: WIDGET-001
                  quantity: '500'
                  eta: '2024-09-01'
                  in_stock: null
                  discontinued: '0'
                  warehouse: Main Warehouse
                - sku: GADGET-XL
                  quantity: null
                  eta: null
                  in_stock: '1'
                  discontinued: '0'
                  warehouse: East Warehouse
      parameters:
      - name: Accept
        in: header
        schema:
          type: string
        example: application/json
      - name: Content-Type
        in: header
        schema:
          type: string
        example: application/json
