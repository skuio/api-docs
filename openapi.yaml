  /api/inventory-aging:
    get:
      tags:
      - Inventory Intelligence
      summary: Get Inventory Aging Report
      description: 'Get the paginated inventory aging report. Supports two view modes:

        - product_summary: Aggregated by product, showing total quantity and average
        age

        - fifo_detail (default): Individual FIFO layers per product with detailed
        age and cost information


        Authentication: Requires Bearer token.


        Filters: warehouse_id, search, age_bracket (0-30, 31-60, 61-90, 91-180, 181-365,
        365+), min_quantity, brand_id, supplier_id, view (product_summary|fifo_detail),
        has_listings (yes|no), has_sales (yes|no), sales_period (7d|14d|30d|90d),
        sales_channel_ids, excluded_sales_channel_ids, listing_filter, min_margin,
        max_margin'
      parameters:
      - name: Accept
        in: header
        schema:
          type: string
        example: application/json
      - name: view
        in: query
        schema:
          type: string
        description: 'Report view mode. Options: product_summary, fifo_detail. Default:
          fifo_detail'
        example: product_summary
      - name: warehouse_id
        in: query
        schema:
          type: integer
        description: Filter by warehouse ID
        example: '1'
      - name: search
        in: query
        schema:
          type: string
        description: Search by product name or SKU (max 255 chars)
        example: Widget
      - name: age_bracket
        in: query
        schema:
          type: string
        description: 'Filter by age bracket. Options: 0-30, 31-60, 61-90, 91-180,
          181-365, 365+'
        example: 61-90
      - name: min_quantity
        in: query
        schema:
          type: integer
        description: Minimum quantity on hand
        example: '1'
      - name: brand_id
        in: query
        schema:
          type: integer
        description: Filter by product brand ID
        example: '3'
      - name: supplier_id
        in: query
        schema:
          type: integer
        description: Filter by supplier ID
        example: '2'
      - name: has_listings
        in: query
        schema:
          type: string
        description: 'Filter by listing presence. Options: yes, no'
        example: 'yes'
      - name: has_sales
        in: query
        schema:
          type: string
        description: 'Filter by recent sales activity. Options: yes, no. See sales_period
          for time window'
        example: 'yes'
      - name: sales_period
        in: query
        schema:
          type: string
        description: 'Sales activity window used with has_sales. Options: 7d, 14d,
          30d, 90d'
        example: 30d
      - name: sales_channel_ids
        in: query
        schema:
          type: string
        description: Comma-separated integration instance IDs to include in sales
          calculations
