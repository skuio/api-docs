  /api/xero/webhook-settings/:integrationInstanceId:
    get:
      tags:
      - Accounting Integrations
      summary: Show Webhook Settings
      description: 'Get the webhook settings for a Xero integration instance. Lazily
        generates a webhook UUID if one doesn''t exist. Returns a masked signing key
        preview (first 4 + last 4 chars) and the 20 most recent webhook events.


        Authentication: Requires Bearer token.'
      parameters:
      - name: Accept
        in: header
        schema:
          type: string
        example: application/json
      responses:
        '200':
          description: Successful response
          content:
            application/json: {}
    patch:
      tags:
      - Accounting Integrations
      summary: Update Webhook Settings
      description: 'Enable or disable Xero webhooks and update the signing key. Key
        rotation is supported with a 1-hour grace period for the previous key.


        Authentication: Requires Bearer token.


        Fields:

        - webhook_enabled (required, boolean): Enable or disable webhook processing

        - signing_key (optional, string, min 32 max 256): HMAC-SHA256 signing key
        from Xero


        Errors:

        - 422: Cannot enable webhooks without a signing key'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              example:
                webhook_enabled: true
                signing_key: your-xero-webhook-signing-key-here-min-32-chars
      parameters:
      - name: Accept
        in: header
        schema:
          type: string
        example: application/json
      - name: Content-Type
        in: header
        schema:
          type: string
        example: application/json
      responses:
        '200':
          description: Successful response
          content:
            application/json: {}
  /api/webhooks/xero/:instanceUuid:
    post:
      tags:
      - Accounting Integrations
      summary: Receive Xero Webhook
      description: 'Public webhook receiver for Xero events. No authentication — Xero
        calls this endpoint directly.


        Signature verification: The x-xero-signature header must contain a valid HMAC-SHA256
        signature of the raw request body using the instance''s stored signing key
        (or the previous key during rotation grace period).


        Rate limit: 120 requests per minute.


        Behavior:

        - Returns 200 OK if the signature is valid (even for malformed payloads —
        Xero uses this for Intent-to-Receive validation)

        - Returns 401 Unauthorized if signature is invalid, instance not found, webhooks
        are disabled, or no signing key

        - Events are persisted as XeroWebhookEvent records and dispatched for async
        processing

        - If integration is inactive, events are recorded as ''ignored'' but 200 is
        returned to prevent Xero from disabling the webhook'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              example:
                events:
                - resourceUrl: https://api.xero.com/api.xro/2.0/Invoices/abc123
                  resourceId: abc123-invoice-uuid
                  eventDateUtc: '2024-05-01T09:00:00Z'
                  eventType: CREATE
                  eventCategory: INVOICE
                  tenantId: tenant-uuid
                  eventSequence: 1
                firstEventSequence: 1
                lastEventSequence: 1
                entropy: random-string-from-xero
      parameters:
      - name: Content-Type
        in: header
        schema:
          type: string
        example: application/json
      - name: x-xero-signature
        in: header
        schema:
          type: string
        example: base64-hmac-sha256-signature-here
      responses:
        '200':
          description: Successful response
          content:
            application/json: {}
  /api/products:
    get:
      tags:
      - Products
      summary: List Products
      description: 'List all products with DataTable support. Supports searching,
        sorting, filtering, pagination, and column selection.


        Authentication: Requires Bearer token.


        Filter scopes available on the Product model:

        - filter[type]: standard | bundle | kit | matrix

        - filter[brand]: brand name string

        - filter[category]: category name or path

        - filter[tag]: tag name

        - filter[supplier]: supplier name or ID


        Sort fields: sku, name, barcode, type, created_at, updated_at, inventory_total,
        inventory_available, average_cost


        Inclusion columns: sku, id, name, barcode, type, image, image_url, brand,
        price, weight, weight_unit, length, width, height, dimension_unit, case_quantity,
        inventory_total, inventory_available, inventory_allocated, inventory_on_hold,
        inventory_in_transit, inventory_incoming, average_cost, default_supplier,
        default_supplier_sku, suppliers, tags, attributes, created_at, updated_at,
        archived_at'
      parameters:
      - name: Accept
        in: header
        schema:
          type: string
        example: application/json
      - name: Content-Type
        in: header
        schema:
          type: string
        example: application/json
      - name: page
        in: query
        schema:
          type: integer
        description: Page number (default 1)
        example: '1'
      - name: limit
        in: query
        schema:
          type: integer
        description: Items per page (default 10)
        example: '10'
      - name: search
        in: query
        schema:
          type: string
        description: Search by SKU, name, or barcode
      - name: sort
        in: query
        schema:
          type: string
        description: 'Sort field. Prefix with - for descending (e.g. -sku). Allowed:
          sku, name, barcode, type, created_at, updated_at, inventory_total, inventory_available,
          average_cost'
        example: sku
      - name: archived
        in: query
        schema:
          type: integer
        description: 0 = active only, 1 = archived only, 2 = all
        example: '0'
      - name: included[]
        in: query
        schema:
          type: string
        description: Columns to include in response. Repeat for multiple.
        example: sku
      - name: included[]
        in: query
        schema:
          type: string
        example: name
      - name: included[]
        in: query
        schema:
          type: string
        example: type
      - name: included[]
        in: query
        schema:
          type: string
        example: barcode
      - name: excluded[]
        in: query
        schema:
          type: string
        description: Columns to exclude. Cannot be used with included[].
      - name: table_specifications
        in: query
        schema:
          type: integer
        description: Set to 1 to return only table column specifications instead of
          data
        example: '0'
      - name: filter[type]
        in: query
        schema:
          type: string
        description: 'Filter by product type: standard, bundle, kit, matrix'
      - name: filter[brand]
        in: query
        schema:
          type: string
        description: Filter by brand name
      - name: filter[category]
        in: query
        schema:
          type: string
        description: Filter by category
      - name: filter[tag]
        in: query
        schema:
          type: string
        description: Filter by tag
      - name: filter[supplier]
        in: query
        schema:
          type: string
        description: Filter by supplier name or ID
      - name: supplier_id
        in: query
        schema:
          type: string
        description: Filter variations shown in the response to those belonging to
          a specific supplier
      responses:
        '200':
          description: Successful response
          content:
            application/json: {}
    post:
      tags:
      - Products
      summary: Create Product
      description: 'Create a new product.


        Authentication: Requires Bearer token.


        Required fields: sku (unique), type

        Product types: standard, bundle, kit, matrix

        Weight units: kg, lb, oz, g

        Dimension units: cm, in, mm, ft


        For bundle/kit products, include components[] with id and quantity.

        For matrix products (parent), include variations[] with sku and attributes.


        Returns 422 validation error if SKU already exists or other validation fails.'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              example:
                sku: SKU-NEW-001
                name: New Product
                type: standard
                barcode: '1234567890123'
                brand_name: Acme Co
                weight: 0.5
                weight_unit: kg
                length: 10
                width: 5
                height: 3
                dimension_unit: cm
                case_quantity: 12
                case_weight: 6
                case_weight_unit: kg
                case_length: 30
                case_width: 20
                case_height: 15
                case_dimension_unit: cm
                fba_prep_instructions: Bubble wrap required
                target_stock_days: 30
                min_stock_level: 50
                proforma_landed_cost_percentage: 5
                proforma_shipping_cost: 2.5
                sales_nominal_code_id: null
                cogs_nominal_code_id: null
                default_tax_rate_id: null
                is_dropshippable: false
                parent_id: null
                tags:
                - new
                - featured
                tags_operation: set
                pricing:
                - product_pricing_tier_name: Default
                  price: 29.99
                suppliers:
                - supplier_id: 5
                  is_default: true
                  supplier_sku: MS-BW-001
                  leadtime: 14
                  minimum_order_quantity: 100
                  pricing:
                  - supplier_pricing_tier_name: Default
                    price: 10
                categories:
                - category_id: 2
                  is_primary: true
                attributes:
                - name: Color
                  value: Blue
                images:
                - url: https://example.com/images/blue-widget.jpg
                  name: Main Image
                  is_primary: true
                  download: false
                components: []
                variations: []
      parameters:
      - name: Accept
        in: header
        schema:
          type: string
        example: application/json
      - name: Content-Type
        in: header
        schema:
          type: string
        example: application/json
      responses:
        '200':
          description: Successful response
          content:
            application/json: {}
    delete:
