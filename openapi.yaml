          application/json:
            schema:
              type: object
              example:
                configuration_snapshot:
                  supplier_ids:
                  - 1
                  forecast_type: sales_history
                  target_stock_days: 30
                results_summary:
                  suppliers_processed: 1
                  skus_to_order: 18
                  purchase_orders_created: 0
                  total_value: 12500
                purchase_order_ids: []
      parameters:
      - name: Accept
        in: header
        schema:
          type: string
        example: application/json
      - name: Content-Type
        in: header
        schema:
          type: string
        example: application/json
