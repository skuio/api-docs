        to unset)

        - tracking (optional): Updated tracking number, max 255 characters'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              example:
                shipping_method_id: 6
                tracking: 1Z999AA10987654321
      parameters:
      - name: Accept
        in: header
        schema:
          type: string
        example: application/json
      - name: Content-Type
