openapi: 3.0.3
info:
  title: SKU.io API
  description: 'SKU.io is an inventory management platform for multichannel ecommerce
    brands.


    ## Authentication


    SKU.io uses **Personal Access Tokens (PATs)** for API authentication.


    1. Log in to your SKU.io account

    2. Go to **Settings → Developer → Personal Access Tokens**

    3. Create a named token with the scopes you need

    4. Use it as a Bearer token in the `Authorization` header


    ```

    Authorization: Bearer <your-token>

    ```'
  version: 1.0.0
  contact:
    name: SKU.io Support
    url: https://sku.io
servers:
- url: https://{tenant}.sku.io
  description: Production
  variables:
    tenant:
      default: app
      description: Your SKU.io subdomain
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      description: Personal Access Token from Settings → Developer → Personal Access
        Tokens
security:
- bearerAuth: []
tags:
- name: Accounting
- name: Financials
- name: Bills
- name: Configuration
- name: Authentication
- name: Users
- name: Alerts
- name: Jobs & Logs
- name: Integration Instances
- name: UI Utilities
- name: Misc
- name: Tags
- name: Subscriptions
- name: Horizon
- name: Stores
- name: Sales Channels
- name: Store Email Templates
- name: Sales Channel Product Templates
- name: Customers
- name: Sales Reps
- name: Channel Partners
- name: Sub Sales Channels
- name: Getting Started
- name: Reporting
- name: Export
- name: Data Feeds
- name: Inventory Intelligence
- name: Shipping Providers
- name: Accounting Integrations
- name: Products
- name: Organization
- name: Pricing
- name: Custom Fields
- name: CSV Templates
- name: Product Listings
- name: Inventory
- name: Adjustments & Transfers
- name: Stock Takes
- name: Assemblies
- name: Initial Inventory
- name: Costing
- name: Landed Cost Breakdown
- name: Sales Orders
- name: Sales Order Lines
- name: Fulfillments
