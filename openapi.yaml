  /api/financial-alerts:
    get:
      tags:
      - Configuration
      summary: List Financial Alerts
      description: 'Returns a paginated list of financial alerts (low margin or loss
        alerts on sales order lines). Uses Spatie QueryBuilder for filtering and sorting.


        Authentication: Requires Bearer token.


        Available sorts: id, created_at, updated_at, alert_type, note, archived_at,
        total_revenue, cogs, cogs_returned, cost_allocated, total_cost, profit, profit_margin,
        salesOrder, sku, classification


        Default sort: -created_at (newest first)


        Alert types: LOSS (profit < 0), LOW_MARGIN (profit >= 0 but margin below threshold)'
      parameters:
      - name: Accept
        in: header
        schema:
          type: string
        example: application/json
      - name: page
        in: query
        schema:
          type: integer
        description: 'Page number (default: 1)'
        example: '1'
      - name: per_page
        in: query
        schema:
          type: integer
        description: 'Items per page (default: 10)'
        example: '10'
      - name: sort
        in: query
        schema:
          type: string
        description: 'Sort field. Prefix with - for descending. Allowed: id, created_at,
          updated_at, alert_type, note, archived_at, total_revenue, cogs, cogs_returned,
          cost_allocated, total_cost, profit, profit_margin, salesOrder, sku, classification'
        example: -created_at
      - name: filter[search]
        in: query
        schema:
          type: string
        description: Search across SKU, product name, sales order number, customer
          name, alert type, note
      - name: filter[archived]
        in: query
        schema:
          type: integer
        description: 0 = active/unresolved only (default), 1 = archived/resolved only,
          2 = all
        example: '0'
      - name: filter[classification]
        in: query
        schema:
          type: string
        description: Filter by financial alert classification ID
      - name: filter[alert_type.contains]
        in: query
        schema:
          type: string
        description: 'Advanced text filter: alert_type contains value (e.g. LOSS,
          LOW_MARGIN)'
      - name: filter[alert_type.equals]
        in: query
        schema:
          type: string
        description: 'Advanced text filter: alert_type exact match'
      - name: filter[note.contains]
        in: query
        schema:
          type: string
        description: 'Advanced text filter: note contains value'
      - name: filter[created_at.from]
        in: query
        schema:
          type: string
        description: 'Advanced date filter: created on or after (YYYY-MM-DD)'
      - name: filter[created_at.to]
        in: query
        schema:
          type: string
        description: 'Advanced date filter: created on or before (YYYY-MM-DD)'
      - name: filter[archived_at.from]
