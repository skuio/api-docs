      - Products
      summary: Export Product List
      description: 'Export products as XLSX or CSV.


        Authentication: Requires Bearer token.


        Scope options:

        - filtered: Uses current filter parameters (same as the products list)

        - all: All products (ignores filters)

        - current_page: First page of current filter results

        - selected: Specific product IDs (requires ids param)


        Content modes:

        - summary: One row per product

        - suppliers: One row per product-supplier combination (expands supplier columns)


        Response: File download (XLSX or CSV)'
      parameters:
      - name: format
        in: query
        schema:
          type: string
        description: 'Export format: xlsx (default) or csv'
        example: xlsx
      - name: scope
        in: query
        schema:
          type: string
        description: 'Export scope: filtered (default, uses active filters), all,
          current_page, selected'
        example: filtered
      - name: content_mode
        in: query
        schema:
          type: string
        description: 'Content mode: summary (default, one row per product) or suppliers
          (one row per product-supplier)'
        example: summary
      - name: columns
        in: query
        schema:
          type: string
        description: Comma-separated column keys to include. Omit for all columns.
        example: id,sku,name,type,inventory_total
      - name: ids
        in: query
        schema:
          type: string
        description: Required when scope=selected. Comma-separated product IDs.
        example: 42,43,44
      - name: filter[search]
        in: query
        schema:
          type: string
        description: Same filters as the products list endpoint apply to 'filtered'
          and 'current_page' scopes
