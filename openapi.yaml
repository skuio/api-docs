                  amount: 15
                  discount: 0
                  tax_rate_id: null
                  estimated_delivery_date: null
                  nominal_code_id: null
                  is_free_of_charge: false
                  linked_backorders: []
                financial_lines:
                - description: Freight
                  quantity: 1
                  amount: 50
                  financial_line_type_id: 1
                  allocate_to_products: true
                  proration_strategy: quantity
      parameters:
