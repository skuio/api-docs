  /api/inventory-forecasting/build:
    post:
      tags:
      - Inventory Intelligence
      summary: Build Forecast
      description: 'Build a forecast for one or more suppliers. Returns forecast results
        per supplier including recommended order quantities.


        Authentication: Requires Bearer token.


        Forecast types: sales_history, target_stock_level, fill_backorders.


        Product filters and sales filters accept a filter_groups tree structure (GroupedFilterSupport)
        with optional legacy filters.filterSet format for backward compatibility.


        Filter operators available: is, is_not, contains, does_not_contain, starts_with,
        ends_with, is_empty, is_not_empty, is_one_of, greater_than, less_than, between.


        Returns 422 if too many products are found for any supplier.'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              example:
                supplier_ids:
                - 1
                - 2
                forecast_type: sales_history
                target_stock_days: 30
                sales_history_days: 90
                sales_start_date: null
                sales_end_date: null
                use_leadtime: true
                use_moq: true
                use_case_pack: false
                case_pack_rounding: round_nearest
                override_product_target_days: false
                rounding_method: round_half_up
                destination_warehouse_id: null
                pricing_tier_id: null
                ignore_min_stock_level: false
                product_filters:
                  filter_groups:
                    conjunction: and
                    children:
                    - type: condition
                      condition:
                        column: sku
                        operator: contains
                        value: PROD
                sales_filters: {}
                demand_modifiers:
                - type: percentage
                  value: 10
                  apply_to: all
                  name: Holiday Boost
                  period_key: null
                  start_date: '2024-11-01'
                  end_date: '2024-12-31'
                  product_id: null
      parameters:
      - name: Accept
        in: header
        schema:
          type: string
        example: application/json
      - name: Content-Type
        in: header
        schema:
          type: string
        example: application/json
      responses:
        '200':
          description: Successful response
          content:
            application/json: {}
  /api/inventory-forecasting/build-single:
    post:
      tags:
      - Inventory Intelligence
      summary: Build Forecast (Single Supplier)
      description: 'Build a forecast for a single supplier. If product count is large,
        dispatches a background job and returns a job_id for polling. Otherwise returns
        the result synchronously.


        Authentication: Requires Bearer token.


        Response type field: sync (includes data) or async (includes job_id for status
        polling).


        Returns 422 if too many products.'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              example:
                supplier_id: 1
                product_count: 120
                supplier_ids:
                - 1
                forecast_type: sales_history
                target_stock_days: 30
                sales_history_days: 90
                use_leadtime: true
                use_moq: true
                rounding_method: round_half_up
                product_filters: {}
                sales_filters: {}
                demand_modifiers: []
      parameters:
      - name: Accept
        in: header
        schema:
          type: string
        example: application/json
      - name: Content-Type
        in: header
        schema:
          type: string
        example: application/json
      responses:
        '200':
          description: Successful response
          content:
            application/json: {}
  /api/inventory-forecasting/job/:jobId/status:
    get:
      tags:
      - Inventory Intelligence
      summary: Get Job Status
      description: 'Poll the status of a background forecast job dispatched by build-single.


        Authentication: Requires Bearer token.


        Status values: queued, processing, completed, failed.


        When status is ''completed'', the result field is included with full forecast
        data.


        Returns 404 if job ID not found or has expired.'
      parameters:
      - name: Accept
        in: header
        schema:
          type: string
        example: application/json
      responses:
        '200':
          description: Successful response
          content:
            application/json: {}
  /api/inventory-forecasting/sales-history:
    post:
      tags:
      - Inventory Intelligence
      summary: Get Sales History
      description: 'Get aggregated sales history for products grouped by time period.


        Authentication: Requires Bearer token.


        Period values: week, month, quarter, year (defaults to week).


        Date format: YYYY-MM-DD. start_date must be <= end_date.


        Returns an array keyed by product_id, each with periods array containing quantity
        and value per period.'
      requestBody:
