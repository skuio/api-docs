  /api/integration-instances:
    post:
      tags:
      - Integration Instances
      summary: Create Integration Instance
      description: 'Create a new integration instance.


        Authentication: Requires Bearer token + Power User access.


        Required: integration_id. Either name or integration_settings.settings.connectionName
        must be provided.


        The store ID from integration_settings.settings.store.id will create an associated
        sales channel.

        For Shopify: triggers location, webhook, products, and orders download if
        credentials are present.

        For Magento: fetches customer groups and product attributes.

        For ShipStation: fetches shipping services and creates webhooks.

        For ShipMyOrders: queues warehouse initialization.

        For Veracore: converts linked warehouse type to 3PL.


        Note: name must be unique across all integration instances.'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              example:
                integration_id: 3
                name: My Shopify Store
                connection_settings: {}
                integration_settings:
                  settings:
                    connectionName: My Shopify Store
                    store:
                      id: myshop.myshopify.com
                  orders:
                    download:
                      open_start_date: '2024-01-01T00:00:00'
                      closed_start_date: '2024-01-01T00:00:00'
                  emailCustomers: false
                is_automatic_sync_enabled: true
      parameters:
      - name: Accept
        in: header
        schema:
          type: string
        example: application/json
      - name: Content-Type
        in: header
        schema:
          type: string
        example: application/json
      responses:
        '200':
          description: Successful response
          content:
            application/json: {}
    get:
      tags:
      - Misc
      summary: List Integration Instances
      description: 'Returns all integration instances (connections to external platforms
        like Shopify, Amazon, Xero, etc.).


        Authentication: Requires Bearer token.'
      parameters:
      - name: Accept
        in: header
        schema:
          type: string
        example: application/json
      - name: per_page
        in: query
        schema:
          type: integer
        example: '10'
      - name: filter[type]
        in: query
        schema:
          type: string
        description: Filter by integration type
        example: shopify
      responses:
        '200':
          description: Successful response
          content:
            application/json: {}
  /api/integration-instances/:integration_instance:
    get:
      tags:
      - Integration Instances
      summary: Get Integration Instance
      description: 'Get a single integration instance with its integration, store
        mappings, and warehouse location map.


        Authentication: Requires Bearer token + Power User access.


        Note: access_token is stripped from connection_settings before returning.'
      parameters:
      - name: Accept
        in: header
        schema:
          type: string
        example: application/json
      responses:
        '200':
          description: Successful response
          content:
            application/json: {}
    put:
      tags:
      - Integration Instances
      summary: Update Integration Instance
      description: 'Update an integration instance. Settings are merged (not replaced)
        with existing settings.


        Authentication: Requires Bearer token + Power User access.


        All fields are optional. Name must be unique.


        If inventory settings change for a sales channel integration, triggers inventory
        cache invalidation.

        If pricing settings change, triggers product listing price cache refresh.

        For sales channel integrations: syncs accounting transaction statuses if sync
        settings change.


        Allowed integration_settings.batch_period_sales_order_fulfillments values:
        daily, monthly, none.'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              example:
                name: My Shopify Store (Updated)
                integration_settings:
                  settings:
                    connectionName: My Shopify Store (Updated)
                  inventory:
                    sync_all_warehouses: true
                  sync_sales_order_invoices_to_accounting: false
                  sync_sales_credit_to_accounting: false
                  batch_period_sales_order_fulfillments: daily
                  proforma_marketplace_cost_percentage: 2.5
                  proforma_payment_cost_percentage: 1.5
                is_automatic_sync_enabled: true
      parameters:
      - name: Accept
        in: header
        schema:
          type: string
        example: application/json
      - name: Content-Type
        in: header
        schema:
          type: string
        example: application/json
      responses:
        '200':
          description: Successful response
          content:
            application/json: {}
    delete:
      tags:
      - Integration Instances
      summary: Delete Integration Instance
      description: 'Queue deletion of an integration instance. The actual deletion
        is handled asynchronously via the salesOrderProcessing queue.


        Authentication: Requires Bearer token + Power User access.'
      parameters:
      - name: Accept
        in: header
        schema:
          type: string
        example: application/json
      responses:
        '200':
          description: Successful response
          content:
            application/json: {}
  /api/integration-instances/:integration_instance/listings:
    get:
      tags:
      - Integration Instances
      summary: List Listings (Sales Channel Products)
      description: 'Get listings (sales channel products) for an integration instance.


        Authentication: Requires Bearer token + Power User access.


        The model type depends on the integration (Shopify listings, Amazon listings,
        etc.). Returns a DataTable resource with table specifications.


        Set table_specifications=1 to get column definitions only.

        Supports filter, sort, archived, search, included, excluded, and pagination.'
      parameters:
      - name: Accept
        in: header
        schema:
          type: string
        example: application/json
      - name: page
        in: query
        schema:
          type: integer
        description: Page number
        example: '1'
      - name: limit
        in: query
        schema:
          type: integer
        description: 'Items per page (default: 10)'
        example: '10'
      - name: sort
        in: query
        schema:
          type: string
        description: Sort field
        example: sku
      - name: archived
        in: query
        schema:
          type: integer
        description: 0 = active only, 1 = archived only
        example: '0'
      - name: search
        in: query
        schema:
          type: string
        description: Search term
        example: my+product
      - name: filters
        in: query
        schema:
          type: string
        description: 'JSON-encoded filter set. Example: {"filterSet":[{"column":"sku","operator":"contains","value":"widget"}]}'
      - name: table_specifications
        in: query
        schema:
          type: string
        description: Set to 1 to return only the table column specifications (no data)
      - name: included[]
        in: query
        schema:
          type: string
        description: Array of field names to include in response
      - name: excluded[]
        in: query
        schema:
          type: string
        description: Array of field names to exclude from response
      responses:
        '200':
          description: Successful response
          content:
            application/json: {}
    delete:
      tags:
      - Integration Instances
      summary: Bulk Delete Listings
      description: 'Bulk delete listings. Either ids or filters must be provided.


        Authentication: Requires Bearer token + Power User access.'
      parameters:
      - name: Accept
        in: header
        schema:
          type: string
        example: application/json
      - name: Content-Type
        in: header
        schema:
          type: string
        example: application/json
      responses:
        '200':
          description: Successful response
          content:
            application/json: {}
