          created_at, updated_at'
        example: name
      - name: filter[due_date_type]
        in: query
        schema:
          type: string
        description: 'Exact match. Values: immediate, from_invoice_date, end_of_month,
          end_of_next_month, day_of_month'
        example: from_invoice_date
