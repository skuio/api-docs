      description: 'Build a forecast and export the results to a file. Returns a download
        URL/filename.


        Authentication: Requires Bearer token.


        format: csv (default) or excel.


        include_calculation_details: include per-product calculation breakdown (default
        true).


        include_sales_history: include historical sales data (default false).


        config: the same forecast configuration used for the forecast.


        Returns 422 if too many products.'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              example:
                supplier_ids:
                - 1
                - 2
                format: csv
                include_calculation_details: true
                include_sales_history: false
                config:
                  forecast_type: sales_history
                  sales_history_days: 90
                  target_stock_days: 30
                  use_leadtime: true
                  use_moq: true
                  rounding_method: round_half_up
                  product_filters: {}
                  sales_filters: {}
                  demand_modifiers: []
      parameters:
      - name: Accept
        in: header
        schema:
          type: string
        example: application/json
      - name: Content-Type
        in: header
        schema:
          type: string
        example: application/json
      responses:
        '200':
