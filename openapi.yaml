    post:
      tags:
      - Returns & RMAs
      summary: Create RMA
      description: "Create a new RMA for a fulfilled sales order.\n\nAuthentication:\
        \ Requires Bearer token.\n\nValidation rules:\n- sales_order_id: required,\
        \ must be an order that has been fulfilled (unless sales_credit_id is provided)\n\
        - warehouse_id: required\n- status: optional, allowed values: draft, approved\n\
        - notes: optional, max 1000 chars\n- sales_credit_id: optional, if provided\
        \ skips fulfillment and quantity validation\n- rma_lines: required array with\
        \ at least 1 line\n  - product_id: required\n  - expected_quantity: required,\
        \ min 1, cannot exceed fulfilled minus already RMA'd quantity\n  - sales_order_line_id:\
        \ optional, must belong to the specified sales order and match the product\n\
        \  - return_reason_id: optional\n  - notes: optional, max 500 chars"
      requestBody:
        content:
          application/json:
            schema:
              type: object
              example:
                sales_order_id: 10
                warehouse_id: 2
                status: draft
                notes: Customer returning 2 units of Widget A due to defect
                sales_credit_id: null
                rma_lines:
                - product_id: 20
                  expected_quantity: 2
                  sales_order_line_id: 55
                  return_reason_id: 1
                  notes: Unit arrived damaged
      parameters:
      - name: Accept
        in: header
        schema:
          type: string
        example: application/json
      - name: Content-Type
        in: header
        schema:
          type: string
        example: application/json
      responses:
        '200':
          description: Successful response
          content:
            application/json: {}
