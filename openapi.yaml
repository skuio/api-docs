  /api/integration-instances/:integration_instance/listings/create-sku-products:
    post:
      tags:
      - Integration Instances
      summary: Create SKU Products from Listings
      description: 'Create SKU products from listings using a field mapping. Either
        ids, filters, or initial_mapping must be provided.


        Authentication: Requires Bearer token + Power User access.


        If more than 10 listings are selected, queues the job. Otherwise creates synchronously.

        If initial_mapping=true, saves the mapping only without creating products.'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              example:
                ids:
                - abc123
                - def456
                mapping:
                - listing_field: sku
                  sku_field: sku
                  parsers: []
                - listing_field: title
                  sku_field: name
                  parsers: []
      parameters:
      - name: Accept
