          type: string
        description: 'Sort field. Allowed: id, quantity, eta, in_stock, discontinued,
          created_at, updated_at. Prefix with - for descending (default: -updated_at)'
        example: -updated_at
      - name: filter[id]
        in: query
        schema:
          type: integer
