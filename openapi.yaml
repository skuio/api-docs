  /api/tracked-job-logs:
    get:
      tags:
      - Jobs & Logs
      summary: List Tracked Job Logs
      description: 'Returns a paginated DataTable list of tracked job logs. Tracked
        jobs represent background queue jobs visible in the job progress tray.


        Authentication: Requires Bearer token.


        Query parameters:

        - page — Page number (default: 1)

        - limit — Results per page (default: 15)

        - search — Full-text search by job name or type

        - sort — Sort field, prefix with - for descending (e.g., -created_at)

        - archived — 0 = active records, 1 = archived records'
      parameters:
      - name: Accept
        in: header
        schema:
          type: string
        example: application/json
      - name: page
        in: query
        schema:
          type: integer
        description: Page number for pagination
        example: '1'
      - name: limit
        in: query
        schema:
          type: integer
        description: Number of results per page
        example: '15'
      - name: search
        in: query
        schema:
          type: string
        description: Search job logs by job name or type
      - name: sort
        in: query
        schema:
          type: string
        description: 'Sort field (prefix with - for descending). Allowed: id, job_name,
          status, created_at, updated_at'
        example: -created_at
      - name: archived
        in: query
        schema:
          type: integer
        description: Include archived/deleted records (0 = active, 1 = archived)
        example: '0'
      responses:
        '200':
          description: Successful response
          content:
            application/json: {}
    post:
      tags:
      - Jobs & Logs
      summary: Create Tracked Job Log
      description: 'Creates a new tracked job log entry. Note: Tracked job logs are
        typically created automatically by the TrackableJobTrait when background jobs
        are dispatched.


        Authentication: Requires Bearer token.'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              example:
                job_name: Manual Job Entry
                status: pending
      parameters:
      - name: Accept
        in: header
        schema:
          type: string
        example: application/json
      - name: Content-Type
        in: header
        schema:
          type: string
        example: application/json
      responses:
        '200':
          description: Successful response
          content:
            application/json: {}
