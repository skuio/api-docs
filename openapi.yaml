      - Product Import
      summary: Download Import Template (XLSX)
      description: 'Downloads the multi-sheet XLSX import template, prefilled with
        sample rows and tenant reference data (brands, categories).


        Route: v2.products.import.template


        SKU-8009 update: the data sheet now includes nine new purple-headed image
        URL columns:

        - image_url_1 — Primary Image URL

        - image_url_2 .. image_url_9 — Additional gallery image URLs


        The guide sheet documents these columns. Sample rows include picsum.photos
        placeholder URLs for image_url_1, image_url_2, and image_url_3.


        Response: binary XLSX file (Content-Type: application/vnd.openxmlformats-officedocument.spreadsheetml.sheet).'
      parameters:
      - name: Accept
        in: header
        schema:
          type: string
        example: application/vnd.openxmlformats-officedocument.spreadsheetml.sheet
      - name: Authorization
        in: header
        schema:
          type: string
        example: Bearer {{token}}
      responses:
        '200':
          description: Successful response
          content:
            application/json: {}
  /api/v2/products/import/validate:
    post:
      tags:
      - Product Import
      summary: Validate Import
      description: "Validates mapped import rows and returns a structured preview.\
        \ No side effects — safe to call repeatedly.\n\nRoute: v2.products.import.validate\n\
        \nRequired body field:\n- rows: array (min 1) of row objects with mapped column\
        \ keys.\n\nSKU-8009 added image URL fields to the accepted row shape:\n- rows[].image_url_1\
        \ (string) — Primary image URL (http/https only, max 2048 chars)\n- rows[].image_url_2\
        \ .. rows[].image_url_9 (string) — Additional gallery image URLs\n\nValidation\
        \ rules for each image_url_N:\n- Must start with http:// or https://\n- Must\
        \ pass FILTER_VALIDATE_URL\n- Must be <= 2048 characters\n- Duplicate URLs\
        \ (case-insensitive) are skipped with a warning\n- If all image_url_* columns\
        \ are blank/unmapped, existing product images are left unchanged\n\nResponse\
        \ shape: { products: [...], summary: {...} }\n\nEach product entry includes\
        \ a new field:\n- _image_urls: array of { url, is_primary, sort_order, download\
        \ } | null\n  - null = no image_url_* columns mapped, OR all blank (existing\
        \ images preserved)\n  - Otherwise: ordered by image_url_1..9 position; image_url_1\
        \ becomes is_primary=true; download=true triggers async download/storage on\
        \ import.\n\nThe summary reports: total_products, total_new, total_updates,\
        \ total_errors, total_warnings."
      requestBody:
        content:
          application/json:
            schema:
              type: object
              example:
                rows:
                - sku: SAMPLE-SKU-001
                  name: Sample Product One
                  type: standard
                  barcode: 012345678901
                  mpn: MFG-001
                  brand: Acme Co
                  category: Widgets
                  unit_cost: 9.99
                  weight: 0.5
                  weight_unit: kg
                  length: 10
                  width: 5
                  height: 3
                  dimension_unit: cm
                  tags: sample, import
                  image_url_1: https://picsum.photos/seed/sku-001-front/600/600
                  image_url_2: https://picsum.photos/seed/sku-001-back/600/600
                  image_url_3: https://picsum.photos/seed/sku-001-side/600/600
                  image_url_4: ''
                  image_url_5: ''
                  image_url_6: ''
                  image_url_7: ''
                  image_url_8: ''
                  image_url_9: ''
      parameters:
      - name: Accept
        in: header
        schema:
          type: string
        example: application/json
      - name: Authorization
        in: header
        schema:
          type: string
        example: Bearer {{token}}
      - name: Content-Type
        in: header
        schema:
          type: string
        example: application/json
      responses:
        '200':
          description: Successful response
          content:
            application/json: {}
  /api/v2/products/import:
    post:
      tags:
      - Product Import
      summary: Execute Import
      description: "Executes the import — creates new products or updates existing\
        \ ones (matched by existing_product_id or id) inside a single DB transaction.\n\
        \nRoute: v2.products.import.import\n\nRequired body field:\n- products: array\
        \ (min 1) of validated product objects produced by the validate endpoint.\n\
        \nSKU-8009 added the _image_urls field to each product object:\n- _image_urls:\
        \ array<{ url: string, is_primary: bool, sort_order: int, download: bool }>\
        \ | null\n  - When non-null and non-empty, the import calls CreateUpdateProductService::addImages()\
        \ which REPLACES the product's existing images with the supplied set.\n  -\
        \ When null or empty, existing product images are LEFT UNCHANGED (allowing\
        \ partial column mapping without wiping image data).\n  - Exactly one entry\
        \ should have is_primary=true (the validate endpoint guarantees this; if not,\
        \ the first entry is auto-promoted).\n  - download=true causes the server\
        \ to fetch and store the image bytes from the URL.\n\nResponse: 201 Created\
        \ on success, 422 Unprocessable Entity on failure.\n\nSuccess shape: { created:\
        \ [{id, sku, name}], updated: [{id, sku, name}], errors: [] }\nFailure shape:\
        \ { message: \"Import failed: ...\" } (transaction is rolled back)."
      requestBody:
        content:
          application/json:
            schema:
              type: object
              example:
                products:
                - sku: SAMPLE-SKU-001
                  name: Sample Product One
                  type: standard
                  barcode: 012345678901
                  mpn: MFG-001
                  brand_id: 12
                  category_id: 7
                  unit_cost: 9.99
                  weight: 0.5
                  weight_unit: kg
                  length: 10
                  width: 5
                  height: 3
                  dimension_unit: cm
                  tags: sample, import
                  _image_urls:
                  - url: https://picsum.photos/seed/sku-001-front/600/600
                    is_primary: true
                    sort_order: 0
                    download: true
                  - url: https://picsum.photos/seed/sku-001-back/600/600
                    is_primary: false
                    sort_order: 1
                    download: true
                  - url: https://picsum.photos/seed/sku-001-side/600/600
                    is_primary: false
                    sort_order: 2
                    download: true
                  existing_product_id: null
      parameters:
      - name: Accept
        in: header
        schema:
          type: string
        example: application/json
      - name: Authorization
        in: header
        schema:
          type: string
        example: Bearer {{token}}
      - name: Content-Type
        in: header
        schema:
          type: string
        example: application/json
      responses:
        '200':
          description: Successful response
          content:
            application/json: {}
