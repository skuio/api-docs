  /api/reporting/sales-channel-coverage:
    post:
      tags:
      - Reporting
      summary: Get Sales Channel Coverage (Legacy)
      description: 'Returns sales channel coverage data (legacy POST endpoint). Prefer
        the paginated GET endpoint for new implementations.


        Authentication: Requires Bearer token


        Required:

        - byIntegration: boolean (true = group by integration, false = group by instance)

        - showNumberOfCoverages: boolean (true = show count, false = show boolean)

        - ids: array of integration or instance IDs'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              example:
                byIntegration: true
                showNumberOfCoverages: false
                ids:
                - 1
                - 2
                - 3
      parameters:
      - name: Accept
        in: header
        schema:
          type: string
        example: application/json
      - name: Content-Type
        in: header
        schema:
          type: string
        example: application/json
      responses:
        '200':
          description: Successful response
          content:
            application/json: {}
  /api/reporting/sales-channel-coverage/paginated:
    get:
      tags:
      - Reporting
      summary: Get Sales Channel Coverage (Paginated)
      description: 'Returns paginated sales channel coverage data per product using
        Spatie QueryBuilder. Shows which products are listed on which sales channels.


        Authentication: Requires Bearer token


        Filters: filter[search] (by SKU), filter[search_supplier] (by supplier name),
        filter[product_types] (comma-separated: standard|blemished|kit), filter[integration_ids]
        (comma-separated), filter[instance_ids] (comma-separated)'
      parameters:
      - name: Accept
        in: header
        schema:
          type: string
        example: application/json
      - name: page
        in: query
        schema:
          type: integer
        description: Page number
        example: '1'
      - name: per_page
        in: query
        schema:
          type: integer
        description: 'Items per page (default: 25)'
        example: '25'
      - name: by_integration
        in: query
        schema:
          type: integer
        description: '1 = group by integration, 0 = group by instance (default: 1)'
        example: '1'
      - name: show_count
        in: query
        schema:
          type: integer
        description: '1 = show coverage count, 0 = show boolean (default: 0)'
        example: '0'
      - name: filter[search]
        in: query
        schema:
          type: string
        description: Search by SKU
        example: WIDGET
      - name: filter[search_supplier]
        in: query
        schema:
          type: string
        description: Search by supplier name
        example: Widget Co
      - name: filter[product_types]
        in: query
        schema:
          type: string
        description: 'Filter by product types (comma-separated: standard | blemished
          | kit)'
        example: standard,kit
      - name: filter[integration_ids]
        in: query
        schema:
          type: string
        description: Filter by integration IDs (comma-separated)
        example: 1,2
      - name: filter[instance_ids]
        in: query
        schema:
          type: string
        description: Filter by integration instance IDs (comma-separated)
        example: 3,4
      responses:
        '200':
          description: Successful response
          content:
            application/json: {}
