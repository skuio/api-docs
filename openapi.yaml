  /api/purchase-orders/build:
    post:
      tags:
      - Purchase Orders
      summary: Build PO (Forecast)
      description: "Build a suggested purchase order based on sales history or other\
        \ forecast types.\n\nAuthentication: Requires Bearer token.\n\nRequired fields:\n\
        - supplier_id (required, exists:suppliers)\n- destination_warehouse_id (required\
        \ unless forecast_type=sales_history, exists:warehouses)\n- forecast_type\
        \ (required): in:sales_history,target_stock_level,backorder\n- options (required,\
        \ array):\n  - quantity (required when forecast_type=target_stock_level, numeric,\
        \ min:0)\n  - sales_start_date (required when forecast_type=sales_history,\
        \ date, before:tomorrow)\n  - sales_end_date (required when forecast_type=sales_history,\
        \ date, after_or_equal sales_start_date)\n  - target_stock_days (required\
        \ when forecast_type=sales_history, integer, min:1)\n  - rounding_method (optional):\
        \ none, ceil, floor, round\n  - use_leadtime (optional, boolean)\n  - use_moq\
        \ (optional, boolean)\n  - product_filters (optional, array)\n  - sales_history_filters\
        \ (optional, array)\n\nNote: Max 500 products per build request."
      requestBody:
        content:
          application/json:
            schema:
              type: object
              example:
                supplier_id: 5
                destination_warehouse_id: 2
                forecast_type: sales_history
                options:
                  sales_start_date: '2023-10-01'
                  sales_end_date: '2023-12-31'
                  target_stock_days: 60
                  rounding_method: ceil
                  use_leadtime: true
                  use_moq: true
                  product_filters: {}
                  sales_history_filters: {}
      parameters:
      - name: Accept
        in: header
        schema:
          type: string
        example: application/json
      - name: Content-Type
        in: header
        schema:
          type: string
        example: application/json
      responses:
        '200':
          description: Successful response
          content:
            application/json: {}
