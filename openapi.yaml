          type: string
        example: application/json
      - name: Authorization
        in: header
        schema:
          type: string
        example: Bearer {{channel-token}}
      - name: page
        in: query
        schema:
          type: integer
        example: '1'
      - name: per_page
        in: query
        schema:
          type: integer
        example: '15'
      responses:
        '200':
          description: Successful response
          content:
            application/json: {}
    post:
      tags:
      - Sales Channels
      summary: Create Order
      description: "Creates a new sales order from a channel integration.\n\nAuthentication:\
        \ Requires channel integration token (channel:write ability).\n\nRate limits:\
        \ 500 requests per 60 seconds.\n\nAll inbound events are automatically captured\
        \ for audit/replay.\n\nFields:\n- sales_order_number (required, unique per\
        \ channel): External order identifier\n- order_date (required): Order date\n\
        - ship_by_date (optional): Must be >= order_date\n- deliver_by_date (optional):\
        \ Must be >= order_date\n- customer_po_number (optional): Customer's PO reference\n\
        - requested_shipping_method (optional): Requested shipping service\n- shipping_charge\
        \ (optional): Shipping amount\n- customer (optional): Customer info — must\
        \ have EITHER id OR name, not both\n  - customer.id: Existing customer ID\n\
        \  - customer.name: Customer name\n  - customer.email: Email\n  - customer.phone:\
        \ Phone\n  - customer.company: Company name\n- billing_address (optional):\
        \ Billing address object\n- shipping_address (optional): Shipping address\
        \ object\n  - *.name, *.company, *.address1, *.address2, *.city, *.province_code,\
        \ *.zip, *.country_code, *.phone\n- sales_order_lines (required, min 1): Order\
        \ lines\n  - lines.*.sku (required): Product SKU (must exist)\n  - lines.*.quantity\
        \ (required): Quantity (min 1)\n  - lines.*.unit_price (optional): Unit price\n\
        \  - lines.*.description (optional): Line description\n- notes (optional):\
        \ Array of note strings\n- tags (optional): Array of tag strings\n- sales_rep\
        \ (optional): Sales rep — must have EITHER id OR name, not both\n  - sales_rep.id:\
        \ Existing active sales rep ID\n  - sales_rep.name: Sales rep name"
      requestBody:
        content:
          application/json:
            schema:
              type: object
              example:
                sales_order_number: EXT-ORDER-2024-001
                order_date: '2024-06-01'
                ship_by_date: '2024-06-05'
                deliver_by_date: '2024-06-07'
                customer_po_number: CUST-PO-001
                requested_shipping_method: standard
                shipping_charge: 9.99
                customer:
                  name: John Doe
                  email: john.doe@example.com
                  company: Acme Corp
                billing_address:
                  name: John Doe
                  address1: 123 Main St
                  address2: Apt 4B
                  city: New York
                  province_code: NY
                  zip: '10001'
                  country_code: US
                  phone: +1-212-555-0100
                shipping_address:
                  name: John Doe
                  address1: 123 Main St
                  city: New York
                  province_code: NY
                  zip: '10001'
                  country_code: US
                sales_order_lines:
                - sku: WIDGET-PRO-001
                  quantity: 2
                  unit_price: 75
                  description: Widget Pro x2
                notes:
                - Please ship as soon as possible
                tags:
                - vip
                - priority
                sales_rep:
                  name: Jane Smith
                  email: jane@sku.io
      parameters:
      - name: Accept
        in: header
        schema:
          type: string
        example: application/json
      - name: Content-Type
        in: header
        schema:
          type: string
        example: application/json
      - name: Authorization
        in: header
        schema:
          type: string
        example: Bearer {{channel-token}}
      responses:
        '200':
          description: Successful response
          content:
            application/json: {}
