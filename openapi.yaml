      - Misc
      summary: List FIFO Layers
      description: 'Returns a paginated list of FIFO inventory layers. Supports GroupedFilterSupport
        filter trees and sorting.


        Authentication: Requires Bearer token.


        Sort options: id, fifo_layer_date, original_quantity, fulfilled_quantity,
        available_quantity, avg_cost, total_cost, condition, created_at, updated_at,
        warehouse_name, sku, product_name


        Archived layers are excluded by default.'
      parameters:
      - name: Accept
        in: header
        schema:
          type: string
        example: application/json
      - name: sort
        in: query
        schema:
          type: string
        description: 'Sort field. Prefix with - for descending. Options: id, fifo_layer_date,
          original_quantity, fulfilled_quantity, available_quantity, avg_cost, total_cost,
          condition, created_at, updated_at, warehouse_name, sku, product_name'
        example: -fifo_layer_date
      - name: per_page
        in: query
        schema:
          type: integer
        example: '10'
      - name: page
        in: query
        schema:
          type: integer
        example: '1'
      - name: filter[product_id]
        in: query
        schema:
          type: integer
        description: Filter by product ID
        example: '1'
      - name: filter[warehouse_id]
        in: query
        schema:
          type: integer
        description: Filter by warehouse ID
        example: '1'
      - name: filter[condition]
        in: query
        schema:
          type: string
        description: Filter by condition
        example: new
      - name: filter[archived]
        in: query
        schema:
          type: boolean
        description: Include archived layers (default excludes them)
        example: 'false'
      - name: filter_groups[conjunction]
        in: query
        schema:
          type: string
        description: 'GroupedFilterSupport tree (conjunction: and|or)'
        example: and
      - name: filter_groups[children][0][type]
        in: query
        schema:
          type: string
        example: condition
      - name: filter_groups[children][0][condition][column]
        in: query
        schema:
          type: string
        example: sku
      - name: filter_groups[children][0][condition][operator]
        in: query
        schema:
          type: string
        example: contains
      - name: filter_groups[children][0][condition][value]
        in: query
        schema:
          type: string
        example: ABC
      responses:
        '200':
          description: Successful response
          content:
            application/json: {}
