                - supplier_id: 1
                  pricing_tier_id: null
                  destination_warehouse_id: 2
                  approval_status: draft
                  submit_to_supplier: false
                  lines:
                  - supplier_product_id: 101
                    quantity: 50
                    unit_cost: 12.5
                  - supplier_product_id: 102
                    quantity: 25
                    unit_cost: null
                  forecast_config:
