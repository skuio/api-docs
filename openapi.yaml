            application/json: {}
    post:
      tags:
      - Inventory Intelligence
      summary: Create Configuration
      description: 'Create a new saved forecast configuration.


        Authentication: Requires Bearer token.


        name must be unique.


        forecast_type values: sales_history, target_stock_level, fill_backorders.


        target_stock_days is required unless forecast_type is fill_backorders.


        Rounding methods: round_half_up, round_up, round_down, truncate.


        Returns 201 on success.'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              example:
                name: Monthly Reorder - Supplier B
                description: Monthly replenishment run for Supplier B
                supplier_ids:
                - 2
