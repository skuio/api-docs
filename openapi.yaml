      - Products
      summary: Bulk Edit Products (Apply to All)
      description: "Apply the same set of changes to all selected products.\n\nAuthentication:\
        \ Requires Bearer token.\n\nFields:\n- product_ids (required, array, max 500):\
        \ Product IDs to update\n- changes (required, array): List of changes, each\
        \ with:\n  - field (required, string): Field name to change\n  - operation\
        \ (required, string): Operation type (e.g., 'set', 'clear')\n  - value (nullable):\
        \ New value\n  - tier_id (nullable, integer): Required for pricing field changes\n\
        \  - attribute_id (nullable, integer): Required for attribute field changes\n\
        \  - supplier_id (nullable, integer): Required for supplier field changes"
      requestBody:
        content:
          application/json:
            schema:
              type: object
              example:
                product_ids:
                - 42
                - 43
                - 44
                changes:
                - field: weight
                  operation: set
                  value: 0.6
                - field: weight_unit
                  operation: set
                  value: kg
                - field: pricing
                  operation: set
                  tier_id: 1
                  value: 14.99
                - field: attribute
                  operation: set
                  attribute_id: 1
                  value: Blue
      parameters:
      - name: Accept
        in: header
        schema:
          type: string
        example: application/json
      - name: Content-Type
        in: header
        schema:
          type: string
        example: application/json
      responses:
        '200':
          description: Successful response
          content:
            application/json: {}
  /api/v2/products/bulk-edit-individual:
    post:
      tags:
      - Products
      summary: Bulk Edit Products (Individual)
      description: 'Apply individual per-product changes.


        Authentication: Requires Bearer token.


        Max 100 products per request. Each product''s changes object supports:

        - Basic: name, brand_id, is_dropshippable, barcode, mpn

        - Shipping: weight, weight_unit, length, width, height, dimension_unit, case_quantity,
        case_weight, case_weight_unit, case_length, case_width, case_height, case_dimension_unit,
        fba_prep_instructions

        - Costing: unit_cost, proforma_shipping_cost, proforma_landed_cost_percentage,
        proforma_marketplace_cost_percentage

        - Accounting: sales_nominal_code_id, cogs_nominal_code_id, inventory_nominal_code_id,
        inventory_in_transit_nominal_code_id, accrued_purchases_nominal_code_id, discount_nominal_code_id

        - Tax: is_taxable, default_tax_rate_id

        - Taxonomy: primary_category_id, tags_add (array), tags_remove (array)

        - Inventory: min_stock_level

        - Pricing: pricing[].tier_id + pricing[].price

        - Attributes: attributes[].attribute_id + attributes[].value'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              example:
                products:
                - id: 42
                  changes:
                    name: Blue Widget Pro
                    weight: 0.6
                    weight_unit: kg
                    unit_cost: 5.75
                    is_dropshippable: false
                    min_stock_level: 100
                    pricing:
                    - tier_id: 1
                      price: 13.99
                    attributes:
                    - attribute_id: 1
                      value: Blue
                    tags_add:
                    - new-tag
                    tags_remove:
                    - old-tag
      parameters:
      - name: Accept
        in: header
        schema:
          type: string
        example: application/json
      - name: Content-Type
        in: header
        schema:
          type: string
        example: application/json
      responses:
        '200':
          description: Successful response
          content:
            application/json: {}
