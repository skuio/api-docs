      description: "Executes a supplier inventory import — creates or updates inventory\
        \ records for a specific supplier.\n\nAuthentication: Requires Bearer token.\n\
        \nPath params:\n- supplier: Supplier ID\n\nBody fields:\n- items (required):\
        \ Array of validated inventory items (min 1)\n  - items.*.product_id (required):\
        \ Product ID (must exist)\n  - items.*.warehouse_id (optional): Warehouse\
        \ ID (must exist if provided)\n  - items.*.quantity (optional): Stock quantity,\
        \ integer >= 0\n  - items.*.eta (optional): Expected availability date\n \
        \ - items.*.in_stock (optional): Boolean stock flag\n  - items.*.discontinued\
        \ (optional): Boolean discontinued flag\n\nNote: Use the validate endpoint\
        \ first to preview and catch errors before importing."
      requestBody:
        content:
          application/json:
            schema:
