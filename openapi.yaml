  /api/nominal-codes:
    get:
      tags:
      - Configuration
      summary: List Nominal Codes (DataTable)
      description: 'List nominal codes using the DataTable system. Supports full-text
        search across name, code, and type fields.


        Authentication: Requires Bearer token.


        DataTable parameters:

        - `page` / `limit` — pagination

        - `search` — searches name, code, type

        - `sort` — sortable columns: id, code, name, type, created_at, updated_at,
        archived_at

        - `archived` — 0 (active only), 1 (archived only)

        - `filter[name]` / `filter[code]` / `filter[type]` — column filters


        Valid `type` values: Revenue, Expense, Asset, Liability, Equity, Bank, Current,
        Inventory, Fixed, Directcosts, Currliab, Termliab, Sales'
      parameters:
      - name: Accept
        in: header
        schema:
          type: string
        example: application/json
      - name: page
        in: query
        schema:
          type: integer
        description: 'Page number (default: 1)'
        example: '1'
      - name: limit
        in: query
        schema:
          type: integer
        description: 'Records per page (default: 15)'
        example: '15'
      - name: search
        in: query
        schema:
          type: string
        description: Search across name, code, and type fields
      - name: sort
        in: query
        schema:
          type: string
        description: Column to sort by. Prefix with - for descending (e.g. -code)
        example: code
      - name: archived
        in: query
        schema:
          type: integer
        description: 0 = active (default), 1 = archived
        example: '0'
      - name: filter[name]
        in: query
        schema:
          type: string
        description: Filter by name
        example: Revenue
      - name: filter[code]
        in: query
        schema:
          type: integer
        description: Filter by code
        example: '4000'
      - name: filter[type]
        in: query
        schema:
          type: string
        description: 'Filter by type. Allowed values: Revenue, Expense, Asset, Liability,
          Equity, Bank, Current, Inventory, Fixed, Directcosts, Currliab, Termliab,
          Sales'
        example: Revenue
      - name: included[]
        in: query
        schema:
          type: integer
        description: IDs to always include in results
        example: '1'
      - name: excluded[]
        in: query
        schema:
          type: integer
        description: IDs to exclude from results
        example: '5'
      - name: table_specifications
        in: query
        schema:
          type: integer
        description: Include table column specifications
        example: '1'
      responses:
        '200':
          description: Successful response
          content:
            application/json: {}
