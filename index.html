<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="SKU.io API Documentation — inventory management for multichannel ecommerce" />
    <title>SKU.io API Docs</title>
    <link rel="icon" type="image/x-icon" href="https://sku.io/favicon.ico" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <style>
      *, *::before, *::after { box-sizing: border-box; }
      body { margin: 0; padding: 0; }
    </style>
  </head>
  <body>
    <redoc
      spec-url="openapi.yaml"
      hide-download-button="false"
      expand-responses="200"
      path-in-middle-panel="true"
      native-scrollbars="false"
      theme='{
        "spacing": {
          "unit": 5,
          "sectionVertical": 20
        },
        "colors": {
          "primary": {
            "main": "#4F6AF0"
          },
          "success": { "main": "#10B981" },
          "warning": { "main": "#F59E0B" },
          "error": { "main": "#EF4444" },
          "text": {
            "primary": "#111827",
            "secondary": "#6B7280"
          },
          "border": {
            "dark": "#E5E7EB",
            "light": "#F3F4F6"
          },
          "responses": {
            "success": { "color": "#065F46", "backgroundColor": "#ECFDF5", "tabTextColor": "#065F46" },
            "error": { "color": "#991B1B", "backgroundColor": "#FEF2F2", "tabTextColor": "#991B1B" },
            "redirect": { "color": "#92400E", "backgroundColor": "#FFFBEB", "tabTextColor": "#92400E" },
            "info": { "color": "#1E40AF", "backgroundColor": "#EFF6FF", "tabTextColor": "#1E40AF" }
          },
          "http": {
            "get": "#10B981",
            "post": "#4F6AF0",
            "put": "#F59E0B",
            "patch": "#8B5CF6",
            "delete": "#EF4444"
          }
        },
        "typography": {
          "fontSize": "15px",
          "lineHeight": "1.6",
          "fontWeightRegular": "400",
          "fontWeightBold": "600",
          "fontWeightLight": "300",
          "fontFamily": "Inter, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif",
          "smoothing": "antialiased",
          "optimizeSpeed": true,
          "headings": {
            "fontFamily": "Inter, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif",
            "fontWeight": "600",
            "lineHeight": "1.3"
          },
          "code": {
            "fontSize": "13px",
            "fontFamily": "JetBrains Mono, Fira Code, Consolas, monospace",
            "lineHeight": "1.6",
            "fontWeight": "400",
            "color": "#DB2777",
            "backgroundColor": "#FDF4FF",
            "wrap": true
          },
          "links": {
            "color": "#4F6AF0",
            "visited": "#4F6AF0",
            "hover": "#3B55D4"
          }
        },
        "sidebar": {
          "width": "280px",
          "backgroundColor": "#FFFFFF",
          "textColor": "#374151",
          "activeTextColor": "#4F6AF0",
          "groupItems": { "textTransform": "uppercase" },
          "level1Items": { "textTransform": "none" },
          "arrow": { "size": "1.5em", "color": "#9CA3AF" }
        },
        "logo": { "gutter": "16px" },
        "rightPanel": {
          "backgroundColor": "#1F2937",
          "textColor": "#F9FAFB",
          "width": "40%"
        },
        "codeBlock": { "backgroundColor": "#111827" }
      }'
    ></redoc>
    <script src="https://cdn.jsdelivr.net/npm/redoc@latest/bundles/redoc.standalone.js"></script>
  </body>
</html>
