<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="SKU.io API Documentation — inventory management for multichannel ecommerce" />
    <title>SKU.io API Docs</title>
    <link rel="icon" type="image/x-icon" href="https://sku.io/favicon.ico" />
  </head>
  <body>
    <script id="api-reference" data-url="./openapi.yaml" data-configuration='{
      "theme": "default",
      "layout": "sidebar",
      "defaultHttpClient": {
        "targetKey": "shell",
        "clientKey": "curl"
      },
      "customCss": "
        :root {
          --scalar-font: Inter, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif;
          --scalar-font-code: JetBrains Mono, Fira Code, Consolas, monospace;
        }
        @import url(https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap);
      "
    }'></script>
    <script src="https://cdn.jsdelivr.net/npm/@scalar/api-reference"></script>
  </body>
</html>
